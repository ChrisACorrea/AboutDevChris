<div class="grid mt-3">

  <div class="col-10 col-offset-1 md:col-3 lg:mt-8">
    <div class="flex flex-1 flex-row justify-content-center">
      <p-image src="assets/images/chris.png" alt="Christopher Corrêa" width="100%"
        imageClass="w-full max-w-18rem  border-circle">
      </p-image>
    </div>
  </div>

  <div class="col-10 col-offset-1 md:col-6">
    <div class=" flex flex-1 flex-column text-center align-items-center
        md:h-full md:justify-content-center md:text-left md:align-items-start">
      <h1 class="text-3xl font-bold my-2 md:text-5xl lg:text-7xl">Christopher Corrêa</h1>
      <h2 class="text-lg font-medium my-2 md:text-xl lg:text-3xl">Desenvolvedor de Software</h2>

      <div class="flex flex-row mt-3">
        <a pButton type="button" icon="pi pi-github"
          class="p-button-lg p-button-outlined p-button-rounded no-underline mr-3"
          href="https://github.com/ChrisACorrea" target="_blank" rel="noopener"></a>
        <a pButton type="button" icon="pi pi-linkedin"
          class="p-button-lg p-button-outlined p-button-rounded no-underline"
          href="https://www.linkedin.com/in/chrisacorrea/" target="_blank" rel="noopener"></a>
      </div>
    </div>

  </div>

  <div class="col-10 col-offset-1 lg:mt-5 lg:mb-7">
    <p-divider></p-divider>
  </div>

  <div class="col-10 col-offset-1 text-center">
    <div class="text-2xl text-yellow-500 font-medium sm:text-3xl md:text-5xl lg:text-7xl">
      <fa-icon [icon]="faScrewdriverWrench"></fa-icon>
      <span class="mx-2 lg:mx-5">Em construção...</span>
      <fa-icon [icon]="faPaintRoller"></fa-icon>
    </div>
  </div>

</div>
